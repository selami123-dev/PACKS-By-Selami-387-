<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PACKS! By Selami 387</title>
    <link rel="icon" href="https://i.hizliresim.com/hzur2hh.png" type="image/png">
    <style>
        :root {
            --orange: #ff6600;
            --dark: #0a0a0a;
            --card-bg: #1a1a1a;
            --text: #ffffff;
        }

        body {
            background-color: var(--dark);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header { padding: 40px 20px; text-align: center; }
        .logo { width: 80px; margin-bottom: 10px; pointer-events: none; border-radius: 50%; }
        h1 { color: var(--orange); text-transform: uppercase; margin: 0; font-size: 1.8em; letter-spacing: 3px; font-weight: 900; }

        .container { width: 95%; max-width: 800px; padding-bottom: 100px; }

        .cat-row {
            display: flex;
            align-items: center;
            border-bottom: 2px solid var(--orange);
            margin-top: 30px;
            padding-bottom: 10px;
        }
        .cat-img { width: 30px; height: 30px; margin-right: 12px; border-radius: 4px; }

        .pack-item {
            background: var(--card-bg);
            margin-top: 15px;
            padding: 15px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #222;
            transition: 0.3s;
        }
        .pack-item:hover { border-color: var(--orange); background: #222; }

        .pack-info { flex-grow: 1; cursor: pointer; padding: 10px 0; }
        .pack-info h3 { margin: 0; font-size: 1em; }

        .right-side { display: flex; align-items: center; gap: 15px; }

        .mini-preview {
            width: 70px;
            height: auto;
            max-height: 50px;
            border-radius: 4px;
            object-fit: contain; 
            cursor: pointer;
        }

        .main-dl-btn {
            background: var(--orange);
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.85em;
        }

        .modal {
            display: none; 
            position: fixed;
            z-index: 10000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.98);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            width: 90%;
            max-width: 800px;
            text-align: center;
            position: relative;
            z-index: 10001;
            animation: zoomIn 0.2s ease-out;
        }

        @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .modal-img {
            width: 100%;
            max-height: 60vh;
            object-fit: contain;
            border-radius: 10px;
        }

        .modal-title { margin: 20px 0; font-size: 1.4em; font-weight: bold; color: #fff; pointer-events: none; }

        .dl-btn-big {
            display: inline-block;
            background: var(--orange);
            color: white;
            padding: 16px 50px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.1em;
            margin-bottom: 10px;
            position: relative;
            z-index: 10002;
        }

        .exit-hint {
            color: #555;
            font-size: 0.8em;
            margin-top: 10px;
            pointer-events: none;
        }

        .themes {
            position: fixed;
            bottom: 20px;
            background: rgba(20,20,20,0.9);
            padding: 10px 20px;
            border-radius: 40px;
            display: flex; gap: 15px;
            border: 1px solid #333;
        }
        .t-btn { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 1px solid #555; }

    </style>
</head>
<body oncontextmenu="return false;">

<header>
    <img src="https://i.hizliresim.com/hzur2hh.png" class="logo">
    <h1>PACKS! By Selami 387</h1>
</header>

<div class="container">
    <div class="cat-row">
        <img src="https://i.hizliresim.com/77zj3op.png" class="cat-img">
        <span style="font-size: 0.9em; font-weight: bold; color: #777;">DS KATEGORİSİ</span>
    </div>

    <div class="pack-item">
        <div class="pack-info" onclick="openModal('DS V1 Pack By Selami 387', 'https://i.hizliresim.com/c6c0w05.png', 'https://www.dropbox.com/scl/fi/iequ3fx7s543k0or2f2ra/DS-V1-Pack-By-Selami-387.zip?rlkey=pbtnv8so2pebmrug3srnuwz4i&raw=1')">
            <h3>DS V1 Pack By Selami 387</h3>
        </div>
        <div class="right-side">
            <img src="https://i.hizliresim.com/c6c0w05.png" class="mini-preview" onclick="openModal('DS V1 Pack By Selami 387', 'https://i.hizliresim.com/c6c0w05.png', 'https://www.dropbox.com/scl/fi/iequ3fx7s543k0or2f2ra/DS-V1-Pack-By-Selami-387.zip?rlkey=pbtnv8so2pebmrug3srnuwz4i&raw=1')">
            <a href="https://www.dropbox.com/scl/fi/iequ3fx7s543k0or2f2ra/DS-V1-Pack-By-Selami-387.zip?rlkey=pbtnv8so2pebmrug3srnuwz4i&raw=1" download class="main-dl-btn">İNDİR</a>
        </div>
    </div>

    <div class="pack-item">
        <div class="pack-info" onclick="openModal('DS V2 Pack By Selami 387', 'https://i.hizliresim.com/2l6ggox.png', 'https://www.dropbox.com/scl/fi/81lirb8xaapd3krtjp5c9/Ds-V2-Pack-By-Selami-387.zip?rlkey=0nfyyfjfmca6ppwymry7nr18e&raw=1')">
            <h3>DS V2 Pack By Selami 387</h3>
        </div>
        <div class="right-side">
            <img src="https://i.hizliresim.com/2l6ggox.png" class="mini-preview" onclick="openModal('DS V2 Pack By Selami 387', 'https://i.hizliresim.com/2l6ggox.png', 'https://www.dropbox.com/scl/fi/81lirb8xaapd3krtjp5c9/Ds-V2-Pack-By-Selami-387.zip?rlkey=0nfyyfjfmca6ppwymry7nr18e&raw=1')">
            <a href="https://www.dropbox.com/scl/fi/81lirb8xaapd3krtjp5c9/Ds-V2-Pack-By-Selami-387.zip?rlkey=0nfyyfjfmca6ppwymry7nr18e&raw=1" download class="main-dl-btn">İNDİR</a>
        </div>
    </div>
</div>

<div id="pvModal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation();">
        <img id="mImg" src="" class="modal-img" onclick="closeModal();">
        <div class="modal-title" id="mTitle"></div>
        <a id="mDl" href="" download class="dl-btn-big" onclick="event.stopPropagation();">DOSYAYI İNDİR</a>
        <div class="exit-hint">Kapatmak için fotoğrafa veya boşluğa tıkla. (ESC aktif)</div>
    </div>
</div>

<div class="themes">
    <div class="t-btn" style="background:#fff;" onclick="setT('#fff','#222','#eee')"></div>
    <div class="t-btn" style="background:#0a0a0a;" onclick="setT('#0a0a0a','#fff','#1a1a1a')"></div>
    <div class="t-btn" style="background:#444;" onclick="setT('#444','#fff','#555')"></div>
</div>

<script>
    const modal = document.getElementById('pvModal');

    function openModal(name, img, link) {
        document.getElementById('mImg').src = img;
        document.getElementById('mTitle').innerText = name;
        document.getElementById('mDl').href = link;
        modal.style.display = 'flex';
    }

    function closeModal() {
        modal.style.display = 'none';
    }

    document.addEventListener('keydown', (e) => { if(e.key === "Escape") closeModal(); });

    function setT(bg, txt, card) {
        document.body.style.backgroundColor = bg;
        document.body.style.color = txt;
        document.querySelectorAll('.pack-item').forEach(i => i.style.background = card);
    }
</script>

</body>
</html>
